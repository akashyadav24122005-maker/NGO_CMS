{% extends 'base.html' %}
{% block content %}
<div class="donate-page">
<div class="donate-section">

<h2 class="text-center mb-3">Support Our Cause</h2>

<p class="text-center mb-4">
Your contribution helps us bring education, healthcare, and better opportunities to communities in need.
</p>

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card p-4 shadow">

<form method="POST">
{% csrf_token %}

<!-- Name -->
<div class="mb-3">
<input type="text" name="name" class="form-control" placeholder="Full Name" required>
</div>

<!-- Email -->
<div class="mb-3">
<input type="email" name="email" class="form-control" placeholder="Email Address" required>
</div>

<!-- Amount -->
<div class="mb-3">
<label>Select Donation Amount</label><br>

<button type="button" class="btn btn-outline-success m-1" onclick="setAmount(100)">₹100</button>
<button type="button" class="btn btn-outline-success m-1" onclick="setAmount(500)">₹500</button>
<button type="button" class="btn btn-outline-success m-1" onclick="setAmount(1000)">₹1000</button>

<input type="number" id="amount" name="amount" class="form-control mt-2" placeholder="Enter custom amount" required>
</div>

<!-- Type -->
<div class="mb-3">
<label>Donation Type</label><br>
<input type="radio" name="type" value="one-time" checked> One-Time
<input type="radio" name="type" value="monthly"> Monthly
</div>

<!-- Message -->
<div class="mb-3">
<textarea name="message" class="form-control" rows="3" placeholder="Optional Message"></textarea>
</div>

<!-- Button -->
<button type="submit" class="btn btn-success w-100">Donate Now</button>

</form>

</div>

</div>

</div>

</div>

<script>
function setAmount(value){
    document.getElementById("amount").value = value;
}
</script>
</div>
{% endblock %}
