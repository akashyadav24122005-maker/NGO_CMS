{% extends 'base.html' %}

{% block content %}

<div class="container">

<h2 class="text-center mb-4">Contact Us</h2>

<div class="row">

<!-- Contact Form -->
<div class="col-md-6">

<h4>Send Us a Message</h4>

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<input type="text" name="name" class="form-control" placeholder="Your Name" required>
</div>

<div class="mb-3">
<input type="email" name="email" class="form-control" placeholder="Your Email" required>
</div>

<div class="mb-3">
<textarea name="message" class="form-control" rows="5" placeholder="Your Message" required></textarea>
</div>

<button type="submit" class="btn btn-success">Send Message</button>

</form>

</div>


<!-- Contact Info -->
<div class="col-md-6">

<h4>Contact Details</h4>

<p><strong>Address:</strong> Lucknow, Uttar Pradesh, India</p>
<p><strong>Phone:</strong> +91 9876543210</p>
<p><strong>Email:</strong> ngo@gmail.com</p>

<h5 class="mt-4">Follow Us</h5>

<a href="#" class="btn btn-outline-dark btn-sm">Facebook</a>
<a href="#" class="btn btn-outline-dark btn-sm">Instagram</a>
<a href="#" class="btn btn-outline-dark btn-sm">Twitter</a>

</div>

</div>

<!-- Map -->
<div class="mt-5">

<h4 class="text-center">Our Location</h4>

<iframe 
src="https://www.google.com/maps?q=lucknow&output=embed"
width="100%" height="300" style="border:0;" allowfullscreen="">
</iframe>

</div>

</div>

{% endblock %}
