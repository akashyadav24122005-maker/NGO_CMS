{% extends 'base.html' %}

{% block title %}Password Changed | NGO CMS{% endblock %}

{% block content %}

<style>
.success-card{
    max-width: 500px;
    margin: auto;
    border-radius: 20px;
    border: none;
}

.success-icon{
    font-size: 60px;
}

.login-btn{
    border-radius: 12px;
    padding: 10px 25px;
    font-weight: 600;
}
</style>

<div class="container py-5">

    <div class="card shadow success-card text-center p-4">

        <div class="success-icon mb-3">✅</div>

        <h2 class="text-success fw-bold">Password Changed</h2>

        <p class="text-muted mt-2">
            Your password has been updated successfully.
            You can now log in with your new password.
        </p>

        <div class="mt-3">
            <a href="{% url 'login' %}" class="btn btn-success login-btn">
                Login Now
            </a>
        </div>

    </div>

</div>

{% endblock %}
