{% extends 'base.html' %}

{% block title %}Forgot Password | NGO CMS{% endblock %}

{% block content %}

<style>
.forgot-card{
    max-width: 520px;
    margin: auto;
    border-radius: 20px;
    border: none;
}

.forgot-card input{
    width: 100%;
    padding: 10px 14px;
    margin-top: 6px;
    margin-bottom: 15px;
    border: 1px solid #ced4da;
    border-radius: 10px;
}

.forgot-card label{
    font-weight: 600;
}

.send-btn{
    border-radius: 12px;
    padding: 10px;
    font-weight: 600;
}
</style>

<div class="container py-5">

    <div class="card shadow forgot-card p-4">

        <h2 class="text-success text-center fw-bold mb-3">
            Forgot Password
        </h2>

        <p class="text-muted text-center mb-4">
            Enter your registered email address to receive a password reset link.
        </p>

        <form method="POST">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-success w-100 send-btn">
                Send Reset Link
            </button>
        </form>

    </div>

</div>

{% endblock %}
