{% extends 'base.html' %}

{% block title %}Email Sent | NGO CMS{% endblock %}

{% block content %}

<style>
.email-card{
    max-width: 520px;
    margin: auto;
    border-radius: 20px;
    border: none;
}

.email-icon{
    font-size: 60px;
}

.back-btn{
    border-radius: 12px;
    padding: 10px 24px;
    font-weight: 600;
}
</style>

<div class="container py-5">

    <div class="card shadow email-card text-center p-4">

        <div class="email-icon mb-3">📩</div>

        <h2 class="text-success fw-bold">Reset Link Sent</h2>

        <p class="text-muted mt-2">
            A password reset link has been sent to your email address.
            Please check your inbox and follow the instructions.
        </p>

        <div class="mt-3">
            <a href="{% url 'login' %}" class="btn btn-outline-success back-btn">
                Back to Login
            </a>
        </div>

    </div>

</div>

{% endblock %}
