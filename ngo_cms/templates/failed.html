{% extends 'base.html' %}
{% block title %}Payment Failed | NGO CMS{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">

        <div class="col-md-6 col-lg-5">

            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-5 text-center">

                    <div class="mb-3" style="font-size:60px;">❌</div>

                    <h2 class="fw-bold text-danger mb-3">
                        Payment Failed
                    </h2>

                    <p class="text-muted mb-4">
                        Your transaction could not be completed.
                        Please try again.
                    </p>

                    <div class="d-grid gap-2">
                        <a href="/donate/" class="btn btn-danger py-2 fw-bold">
                            Try Again
                        </a>

                        <a href="/" class="btn btn-outline-secondary py-2">
                            Back to Home
                        </a>
                    </div>

                </div>
            </div>

        </div>

    </div>
</div>
{% endblock %}
