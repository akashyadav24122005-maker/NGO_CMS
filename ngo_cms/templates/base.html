{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NGO CMS{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        body{
            display:flex;
            flex-direction:column;
            min-height:100vh;
        }

        .navbar-brand{
            font-weight:bold;
            font-size:24px;
        }

        .nav-link{
            color:white !important;
            margin-left:8px;
            transition:0.3s;
        }

        .nav-link:hover{
            color:#ffd700 !important;
        }

        .main-content{
            flex:1;
        }

        .footer-bar{
            background:#198754;
            color:white;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow">
    <div class="container">
        <a class="navbar-brand" href="/">NGO CMS</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/about/">About</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/projects/">Projects</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/volunteer/">Volunteer</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'donate' %}">Donate</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/contact/">Contact</a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4 main-content">
    {% block content %}
    {% endblock %}
</div>

<footer class="text-center p-3 footer-bar">
    <p class="mb-0">© 2026 NGO CMS Project | All Rights Reserved</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
