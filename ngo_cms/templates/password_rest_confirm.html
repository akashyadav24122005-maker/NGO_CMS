{% extends 'base.html' %}

{% block title %}Set New Password | NGO CMS{% endblock %}

{% block content %}

<style>
.reset-card{
    max-width: 550px;
    margin: auto;
    border-radius: 20px;
    border: none;
}

.reset-title{
    font-weight: 700;
}

.reset-card input{
    width: 100%;
    padding: 10px 14px;
    margin-top: 6px;
    margin-bottom: 15px;
    border: 1px solid #ced4da;
    border-radius: 10px;
}

.reset-card label{
    font-weight: 600;
    margin-bottom: 4px;
}

.reset-btn{
    border-radius: 12px;
    padding: 10px;
    font-weight: 600;
}
</style>

<div class="container py-5">

    <div class="card shadow reset-card p-4">

        <h2 class="text-success text-center reset-title mb-3">
            Set New Password
        </h2>

        <p class="text-muted text-center mb-4">
            Enter your new password below.
        </p>

        <form method="POST">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-success w-100 reset-btn">
                Update Password
            </button>
        </form>

    </div>

</div>

{% endblock %}
